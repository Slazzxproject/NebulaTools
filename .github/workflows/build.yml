name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Kode
      uses: actions/checkout@v4

    - name: Siapkan Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Beri Izin Mesin Gradle
      run: chmod +x gradlew

    - name: Mulai Masak APK
      run: ./gradlew assembleDebug

    - name: Upload File APK Jadi
      uses: actions/upload-artifact@v4
      with:
        name: NebulaTools-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
